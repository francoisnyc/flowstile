name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Cancel in-flight runs for the same ref on new pushes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── Fast gate: build + unit + integration ──────────────────────────────────
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: flowstile
          POSTGRES_USER: flowstile
          POSTGRES_PASSWORD: flowstile
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U flowstile"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_HOST: localhost
      DATABASE_PORT: 5432
      DATABASE_NAME: flowstile
      DATABASE_USER: flowstile
      DATABASE_PASSWORD: flowstile
      JWT_SECRET: ci-test-secret-not-for-production

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Check OpenAPI spec is up to date
        run: |
          pnpm --filter @flowstile/server openapi:generate
          git diff --exit-code docs/openapi.yaml || {
            echo "::error::OpenAPI spec is out of date. Run 'pnpm --filter @flowstile/server openapi:generate' and commit the result."
            exit 1
          }

      - name: Unit tests
        run: pnpm test

      - name: Integration tests
        run: pnpm --filter @flowstile/server test:integration

  # ── E2E: full stack including Temporal + browser ───────────────────────────
  e2e:
    runs-on: ubuntu-latest
    needs: build-and-test

    env:
      DATABASE_HOST: localhost
      DATABASE_PORT: 5432
      DATABASE_NAME: flowstile
      DATABASE_USER: flowstile
      DATABASE_PASSWORD: flowstile
      JWT_SECRET: ci-e2e-secret-not-for-production
      TEMPORAL_ADDRESS: localhost:7233
      # Dev API key hard-coded in seed.ts — safe for ephemeral CI only.
      FLOWSTILE_API_KEY: fsk_dev_local_worker_DO_NOT_USE_IN_PROD
      FLOWSTILE_SERVER_URL: http://localhost:3000
      TASK_QUEUE: flowstile

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Start Temporal + PostgreSQL via Docker Compose
        run: |
          docker compose up -d postgres postgres-temporal temporal
          # Poll until all three health-checks report healthy.
          timeout 120 bash -c '
            healthy() { docker compose ps -q "$1" | xargs docker inspect --format "{{.State.Health.Status}}" | grep -q healthy; }
            until healthy postgres && healthy postgres-temporal && healthy temporal; do sleep 3; done'

      - name: Seed database
        run: pnpm --filter @flowstile/server db:seed

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run e2e tests
        run: npx playwright test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
