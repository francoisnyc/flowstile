name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: flowstile
          POSTGRES_USER: flowstile
          POSTGRES_PASSWORD: flowstile
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U flowstile"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_HOST: localhost
      DATABASE_PORT: 5432
      DATABASE_NAME: flowstile
      DATABASE_USER: flowstile
      DATABASE_PASSWORD: flowstile
      JWT_SECRET: ci-test-secret-not-for-production

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Unit tests
        run: pnpm test

      - name: Integration tests
        run: pnpm --filter @flowstile/server test:integration
