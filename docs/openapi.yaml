openapi: 3.1.0
info:
  title: Flowstile API
  version: 0.1.0
  description: >-
    Human-task inbox and form layer for Temporal.io workflows.


    Authentication uses JWT tokens delivered as HttpOnly cookies (`flowstile_token`) or as Bearer tokens in the
    Authorization header.
  license:
    name: Apache-2.0
components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: flowstile_token
    bearerAuth:
      type: http
      scheme: bearer
  schemas: {}
