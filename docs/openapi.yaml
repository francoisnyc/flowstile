openapi: 3.1.0
info:
  title: Flowstile API
  version: 0.1.0
  description: >-
    Human-task inbox and form layer for Temporal.io workflows.


    Authentication uses JWT tokens delivered as HttpOnly cookies (`flowstile_token`) or as Bearer tokens in the
    Authorization header.
  license:
    name: Apache-2.0
components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: flowstile_token
    bearerAuth:
      type: http
      scheme: bearer
  schemas: {}
paths:
  /health:
    get:
      tags:
        - Health
      responses:
        "200":
          description: Default Response
  /auth/login:
    post:
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                  pattern: ^(?!\.)(?!.*\.\.)([A-Za-z0-9_'+\-\.]*)[A-Za-z0-9_+-]@([A-Za-z0-9][A-Za-z0-9\-]*\.)+[A-Za-z]{2,}$
                password:
                  type: string
                  minLength: 1
              required:
                - email
                - password
      responses:
        "200":
          description: Default Response
  /auth/logout:
    post:
      tags:
        - Auth
      responses:
        "200":
          description: Default Response
  /auth/me:
    get:
      tags:
        - Auth
      responses:
        "200":
          description: Default Response
  /auth/api-keys:
    post:
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  minLength: 1
                permissions:
                  minItems: 1
                  type: array
                  items:
                    type: string
                    enum:
                      - tasks:read
                      - tasks:write
                      - tasks:manage
                      - forms:write
                      - processes:write
                      - processes:start
                      - cases:read
                      - users:manage
                expiresAt: {}
              required:
                - name
                - permissions
      responses:
        "200":
          description: Default Response
    get:
      tags:
        - Auth
      responses:
        "200":
          description: Default Response
  /auth/api-keys/{id}:
    delete:
      tags:
        - Auth
      parameters:
        - schema:
            type: string
            format: uuid
            pattern: ^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}|00000000-0000-0000-0000-000000000000|ffffffff-ffff-ffff-ffff-ffffffffffff)$
          in: path
          name: id
          required: true
      responses:
        "200":
          description: Default Response
  /users:
    get:
      tags:
        - Users
      parameters:
        - schema:
            default: 50
            type: integer
            minimum: 1
            maximum: 200
          in: query
          name: limit
          required: false
        - schema:
            default: 0
            type: integer
            minimum: 0
            maximum: 9007199254740991
          in: query
          name: offset
          required: false
      responses:
        "200":
          description: Default Response
    post:
      tags:
        - Users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                  pattern: ^(?!\.)(?!.*\.\.)([A-Za-z0-9_'+\-\.]*)[A-Za-z0-9_+-]@([A-Za-z0-9][A-Za-z0-9\-]*\.)+[A-Za-z]{2,}$
                displayName:
                  type: string
                  minLength: 1
                password:
                  type: string
                  minLength: 8
                groupIds:
                  type: array
                  items:
                    type: string
                    format: uuid
                    pattern: ^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}|00000000-0000-0000-0000-000000000000|ffffffff-ffff-ffff-ffff-ffffffffffff)$
                roleIds:
                  type: array
                  items:
                    type: string
                    format: uuid
                    pattern: ^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}|00000000-0000-0000-0000-000000000000|ffffffff-ffff-ffff-ffff-ffffffffffff)$
              required:
                - email
                - displayName
                - password
      responses:
        "200":
          description: Default Response
  /users/{id}:
    patch:
      tags:
        - Users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                displayName:
                  type: string
                  minLength: 1
                status:
                  type: string
                  enum:
                    - active
                    - inactive
                groupIds:
                  type: array
                  items:
                    type: string
                    format: uuid
                    pattern: ^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}|00000000-0000-0000-0000-000000000000|ffffffff-ffff-ffff-ffff-ffffffffffff)$
                roleIds:
                  type: array
                  items:
                    type: string
                    format: uuid
                    pattern: ^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}|00000000-0000-0000-0000-000000000000|ffffffff-ffff-ffff-ffff-ffffffffffff)$
      parameters:
        - schema:
            type: string
            format: uuid
            pattern: ^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}|00000000-0000-0000-0000-000000000000|ffffffff-ffff-ffff-ffff-ffffffffffff)$
          in: path
          name: id
          required: true
      responses:
        "200":
          description: Default Response
  /roles:
    get:
      tags:
        - Users
      responses:
        "200":
          description: Default Response
  /groups:
    get:
      tags:
        - Groups
      parameters:
        - schema:
            default: 50
            type: integer
            minimum: 1
            maximum: 200
          in: query
          name: limit
          required: false
        - schema:
            default: 0
            type: integer
            minimum: 0
            maximum: 9007199254740991
          in: query
          name: offset
          required: false
      responses:
        "200":
          description: Default Response
    post:
      tags:
        - Groups
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  minLength: 1
                memberIds:
                  type: array
                  items:
                    type: string
                    format: uuid
                    pattern: ^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}|00000000-0000-0000-0000-000000000000|ffffffff-ffff-ffff-ffff-ffffffffffff)$
              required:
                - name
      responses:
        "200":
          description: Default Response
  /groups/{id}:
    patch:
      tags:
        - Groups
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  minLength: 1
                memberIds:
                  type: array
                  items:
                    type: string
                    format: uuid
                    pattern: ^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}|00000000-0000-0000-0000-000000000000|ffffffff-ffff-ffff-ffff-ffffffffffff)$
      parameters:
        - schema:
            type: string
            format: uuid
            pattern: ^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}|00000000-0000-0000-0000-000000000000|ffffffff-ffff-ffff-ffff-ffffffffffff)$
          in: path
          name: id
          required: true
      responses:
        "200":
          description: Default Response
  /forms:
    get:
      tags:
        - Forms
      parameters:
        - schema:
            default: 50
            type: integer
            minimum: 1
            maximum: 200
          in: query
          name: limit
          required: false
        - schema:
            default: 0
            type: integer
            minimum: 0
            maximum: 9007199254740991
          in: query
          name: offset
          required: false
      responses:
        "200":
          description: Default Response
    post:
      tags:
        - Forms
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                code:
                  type: string
                  minLength: 1
                jsonSchema:
                  type: object
                  propertyNames:
                    type: string
                  additionalProperties: {}
                uiSchema:
                  type: object
                  propertyNames:
                    type: string
                  additionalProperties: {}
                visibilityRules:
                  type: object
                  propertyNames:
                    type: string
                  additionalProperties: {}
                formMessages:
                  type: object
                  propertyNames:
                    type: string
                  additionalProperties: {}
                outcomes:
                  anyOf:
                    - type: array
                      items:
                        type: object
                        properties:
                          value:
                            type: string
                            minLength: 1
                          label:
                            type: string
                            minLength: 1
                          style:
                            type: string
                            enum:
                              - primary
                              - secondary
                              - danger
                          requireFields:
                            type: array
                            items:
                              type: string
                              minLength: 1
                        required:
                          - value
                          - label
                    - type: "null"
                outcomeKey:
                  anyOf:
                    - type: string
                      minLength: 1
                    - type: "null"
              required:
                - code
                - jsonSchema
      responses:
        "200":
          description: Default Response
  /forms/{code}:
    get:
      tags:
        - Forms
      parameters:
        - schema:
            type: string
            minLength: 1
          in: path
          name: code
          required: true
      responses:
        "200":
          description: Default Response
  /forms/{code}/versions:
    get:
      tags:
        - Forms
      parameters:
        - schema:
            type: string
            minLength: 1
          in: path
          name: code
          required: true
      responses:
        "200":
          description: Default Response
  /forms/{code}/draft:
    put:
      tags:
        - Forms
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                jsonSchema:
                  type: object
                  propertyNames:
                    type: string
                  additionalProperties: {}
                uiSchema:
                  type: object
                  propertyNames:
                    type: string
                  additionalProperties: {}
                visibilityRules:
                  type: object
                  propertyNames:
                    type: string
                  additionalProperties: {}
                formMessages:
                  type: object
                  propertyNames:
                    type: string
                  additionalProperties: {}
                outcomes:
                  anyOf:
                    - type: array
                      items:
                        type: object
                        properties:
                          value:
                            type: string
                            minLength: 1
                          label:
                            type: string
                            minLength: 1
                          style:
                            type: string
                            enum:
                              - primary
                              - secondary
                              - danger
                          requireFields:
                            type: array
                            items:
                              type: string
                              minLength: 1
                        required:
                          - value
                          - label
                    - type: "null"
                outcomeKey:
                  anyOf:
                    - type: string
                      minLength: 1
                    - type: "null"
      parameters:
        - schema:
            type: string
            minLength: 1
          in: path
          name: code
          required: true
      responses:
        "200":
          description: Default Response
  /forms/{code}/publish:
    post:
      tags:
        - Forms
      parameters:
        - schema:
            type: string
            minLength: 1
          in: path
          name: code
          required: true
      responses:
        "200":
          description: Default Response
  /processes:
    get:
      tags:
        - Processes
      parameters:
        - schema:
            default: 50
            type: integer
            minimum: 1
            maximum: 200
          in: query
          name: limit
          required: false
        - schema:
            default: 0
            type: integer
            minimum: 0
            maximum: 9007199254740991
          in: query
          name: offset
          required: false
      responses:
        "200":
          description: Default Response
    post:
      tags:
        - Processes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  minLength: 1
                status:
                  type: string
                  enum:
                    - active
                    - inactive
                milestones:
                  anyOf:
                    - maxItems: 20
                      type: array
                      items:
                        type: object
                        properties:
                          code:
                            type: string
                            minLength: 1
                          name:
                            type: string
                            minLength: 1
                        required:
                          - code
                          - name
                    - type: "null"
              required:
                - name
      responses:
        "200":
          description: Default Response
  /processes/{id}:
    get:
      tags:
        - Processes
      parameters:
        - schema:
            type: string
            format: uuid
            pattern: ^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}|00000000-0000-0000-0000-000000000000|ffffffff-ffff-ffff-ffff-ffffffffffff)$
          in: path
          name: id
          required: true
      responses:
        "200":
          description: Default Response
    patch:
      tags:
        - Processes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  minLength: 1
                status:
                  type: string
                  enum:
                    - active
                    - inactive
                startFormCode:
                  anyOf:
                    - type: string
                      minLength: 1
                    - type: "null"
                workflowType:
                  anyOf:
                    - type: string
                      minLength: 1
                    - type: "null"
                taskQueue:
                  anyOf:
                    - type: string
                      minLength: 1
                    - type: "null"
                milestones:
                  anyOf:
                    - maxItems: 20
                      type: array
                      items:
                        type: object
                        properties:
                          code:
                            type: string
                            minLength: 1
                          name:
                            type: string
                            minLength: 1
                        required:
                          - code
                          - name
                    - type: "null"
      parameters:
        - schema:
            type: string
            format: uuid
            pattern: ^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}|00000000-0000-0000-0000-000000000000|ffffffff-ffff-ffff-ffff-ffffffffffff)$
          in: path
          name: id
          required: true
      responses:
        "200":
          description: Default Response
  /processes/{id}/start:
    post:
      tags:
        - Processes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  default: {}
                  type: object
                  propertyNames:
                    type: string
                  additionalProperties: {}
                idempotencyKey:
                  type: string
                  minLength: 1
                  maxLength: 200
      parameters:
        - schema:
            type: string
            format: uuid
            pattern: ^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}|00000000-0000-0000-0000-000000000000|ffffffff-ffff-ffff-ffff-ffffffffffff)$
          in: path
          name: id
          required: true
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  processInstanceId:
                    type: string
                  caseId:
                    type: string
                required:
                  - processInstanceId
                  - caseId
                additionalProperties: false
        "201":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  processInstanceId:
                    type: string
                  caseId:
                    type: string
                required:
                  - processInstanceId
                  - caseId
                additionalProperties: false
        "404":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  details: {}
                required:
                  - error
                additionalProperties: false
        "422":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  details: {}
                required:
                  - error
                additionalProperties: false
        "502":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  details: {}
                required:
                  - error
                additionalProperties: false
        "503":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  details: {}
                required:
                  - error
                additionalProperties: false
  /processes/{id}/tasks:
    get:
      tags:
        - Processes
      parameters:
        - schema:
            default: 50
            type: integer
            minimum: 1
            maximum: 200
          in: query
          name: limit
          required: false
        - schema:
            default: 0
            type: integer
            minimum: 0
            maximum: 9007199254740991
          in: query
          name: offset
          required: false
        - schema:
            type: string
            format: uuid
            pattern: ^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}|00000000-0000-0000-0000-000000000000|ffffffff-ffff-ffff-ffff-ffffffffffff)$
          in: path
          name: id
          required: true
      responses:
        "200":
          description: Default Response
    post:
      tags:
        - Processes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                code:
                  type: string
                  minLength: 1
                formDefinitionCode:
                  type: string
                  minLength: 1
                milestoneCode:
                  anyOf:
                    - type: string
                      minLength: 1
                    - type: "null"
                candidateGroups:
                  type: array
                  items:
                    type: string
                candidateUsers:
                  type: array
                  items:
                    type: string
                defaultPriority:
                  type: string
                  enum:
                    - low
                    - normal
                    - high
                    - urgent
              required:
                - code
                - formDefinitionCode
      parameters:
        - schema:
            type: string
            format: uuid
            pattern: ^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}|00000000-0000-0000-0000-000000000000|ffffffff-ffff-ffff-ffff-ffffffffffff)$
          in: path
          name: id
          required: true
      responses:
        "200":
          description: Default Response
  /task-definitions/{id}:
    patch:
      tags:
        - Processes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                formDefinitionCode:
                  type: string
                  minLength: 1
                milestoneCode:
                  anyOf:
                    - type: string
                      minLength: 1
                    - type: "null"
                candidateGroups:
                  type: array
                  items:
                    type: string
                candidateUsers:
                  type: array
                  items:
                    type: string
                defaultPriority:
                  type: string
                  enum:
                    - low
                    - normal
                    - high
                    - urgent
      parameters:
        - schema:
            type: string
            format: uuid
            pattern: ^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}|00000000-0000-0000-0000-000000000000|ffffffff-ffff-ffff-ffff-ffffffffffff)$
          in: path
          name: id
          required: true
      responses:
        "200":
          description: Default Response
  /tasks:
    get:
      tags:
        - Tasks
      parameters:
        - schema:
            default: 50
            type: integer
            minimum: 1
            maximum: 200
          in: query
          name: limit
          required: false
        - schema:
            default: 0
            type: integer
            minimum: 0
            maximum: 9007199254740991
          in: query
          name: offset
          required: false
        - schema:
            type: string
            enum:
              - created
              - claimed
              - completed
              - cancelled
          in: query
          name: status
          required: false
        - schema:
            type: string
            format: uuid
            pattern: ^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}|00000000-0000-0000-0000-000000000000|ffffffff-ffff-ffff-ffff-ffffffffffff)$
          in: query
          name: assigneeId
          required: false
        - schema:
            type: string
          in: query
          name: group
          required: false
        - schema:
            type: string
            enum:
              - not_applicable
              - pending
              - delivered
              - failed
          in: query
          name: signalStatus
          required: false
      responses:
        "200":
          description: Default Response
    post:
      tags:
        - Tasks
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                taskDefinitionId:
                  type: string
                  format: uuid
                  pattern: ^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}|00000000-0000-0000-0000-000000000000|ffffffff-ffff-ffff-ffff-ffffffffffff)$
                taskDefinitionCode:
                  type: string
                  minLength: 1
                formSchema:
                  type: object
                  propertyNames:
                    type: string
                  additionalProperties: {}
                uiSchema:
                  type: object
                  propertyNames:
                    type: string
                  additionalProperties: {}
                name:
                  type: string
                  minLength: 1
                chat:
                  type: object
                  properties:
                    agent:
                      type: string
                      minLength: 1
                    goal:
                      type: string
                      minLength: 1
                    greeting:
                      type: string
                      minLength: 1
                  required:
                    - agent
                    - goal
                workflowId:
                  type: string
                  minLength: 1
                processInstanceId:
                  type: string
                  minLength: 1
                candidateGroups:
                  type: array
                  items:
                    type: string
                candidateUsers:
                  type: array
                  items:
                    type: string
                priority:
                  type: string
                  enum:
                    - low
                    - normal
                    - high
                    - urgent
                dueDate: {}
                followUpDate: {}
                inputData:
                  type: object
                  propertyNames:
                    type: string
                  additionalProperties: {}
                contextData:
                  type: object
                  propertyNames:
                    type: string
                  additionalProperties: {}
                submissionData:
                  type: object
                  propertyNames:
                    type: string
                  additionalProperties: {}
              required:
                - workflowId
      responses:
        "200":
          description: Default Response
  /tasks/search:
    post:
      tags:
        - Tasks
      requestBody:
        required: true
        content:
